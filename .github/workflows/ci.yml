name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit-tests:
    name: Unit Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run unit tests with coverage
        run: |
          python -m pytest tests/unit/ -v \
            --junitxml=reports/junit-unit.xml \
            --cov=server \
            --cov-report=xml:reports/coverage.xml \
            --cov-report=term-missing

      - name: Upload unit test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-reports-py${{ matrix.python-version }}
          path: reports/

      - name: Test Summary
        if: always()
        uses: test-summary/action@v2
        with:
          paths: reports/junit-unit.xml

  e2e-tests:
    name: E2E Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright browsers
        run: python -m playwright install --with-deps chromium

      - name: Run E2E tests
        run: |
          python -m pytest tests/e2e/ -v \
            --junitxml=reports/junit-e2e.xml

      - name: Upload E2E test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-reports-py${{ matrix.python-version }}
          path: reports/

      - name: Test Summary
        if: always()
        uses: test-summary/action@v2
        with:
          paths: reports/junit-e2e.xml
